app-id: io.github.tobagin.scramble
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: scramble
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - "*.a"

modules:
  - name: inih
    buildsystem: meson
    config-opts:
      - -Ddistro_install=true
      - -Dwith_INIReader=true
    sources:
      - type: git
        url: https://github.com/benhoyt/inih.git
        tag: r62
        commit: 26254ee9de7681f8825433415443e7116ff24b98

  - name: exiv2
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DEXIV2_ENABLE_NLS=ON
      - -DEXIV2_BUILD_SAMPLES=OFF
      - -DEXIV2_BUILD_EXIV2_COMMAND=OFF
      - -DEXIV2_ENABLE_BMFF=ON
      - -DCMAKE_CXX_FLAGS=-Wno-format
    sources:
      - type: git
        url: https://github.com/Exiv2/exiv2.git
        tag: v0.28.8
        commit: 829dd7181ecc86716b393495dbb3eec67ac5604d

  - name: libde265
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_DECODER=ON
      - -DENABLE_ENCODER=OFF
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/strukturag/libde265.git
        tag: v1.0.18
        commit: 36ad04841c209cb8b3577ec2723d431b6bf7efa0

  - name: libheif
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DWITH_LIBDE265=ON
      - -DWITH_X265=OFF
      - -DWITH_AOM_DECODER=OFF
      - -DWITH_AOM_ENCODER=OFF
      - -DCMAKE_DISABLE_FIND_PACKAGE_AOM=TRUE
      - -DWITH_JPEG_DECODER=ON
      - -DWITH_JPEG_ENCODER=OFF
      - -DENABLE_PLUGIN_LOADING=OFF
    cleanup:
      - /bin
      - /share/thumbnailers
    sources:
      - type: git
        url: https://github.com/strukturag/libheif.git
        tag: v1.21.2
        commit: 62f1b8c76ed4d8305071fdacbe74ef9717bacac5

  - name: gexiv2
    buildsystem: meson
    config-opts:
      - -Dpython3=false
      - -Dvapi=true
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/gexiv2.git
        tag: "0.16.0"
        commit: 33ac4052bb4132e16fdf2bf043cbddca9c716be6

  - name: scramble
    buildsystem: meson
    config-opts:
      - -Dprofile=stable
    sources:
      - type: git
        url: https://github.com/tobagin/scramble.git
        tag: v1.4.3
        commit: d84f5d2cd8e3290f27a74c0ae8cf2ce3c2c511d0
